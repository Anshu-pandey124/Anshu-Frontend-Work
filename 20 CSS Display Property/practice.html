<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3 Circles — HTML & CSS Examples</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      gap:2rem;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg,var(--bg), #071029 60%);
      font-family:system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      color:var(--muted);
      padding:2rem;
      box-sizing:border-box;
    }

    .wrap{
      width:min(940px, 96%);
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:1.5rem;
      align-items:center;
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
      border-radius:12px;
      padding:1.25rem;
      box-shadow: 0 6px 20px rgba(2,6,23,0.6);
      min-height:280px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:1rem;
      color:#e6eef8;
    }

    .title{
      font-size:14px;
      color:var(--muted);
      margin-top:-6px;
      text-align:center;
    }

    /* ---------------------------
       Example A: Concentric circles
       --------------------------- */
    .concentric {
      position:relative;
      width:260px;
      height:260px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* absolute-positioned circles all centered */
    .concentric .circle {
      position:absolute;
      border-radius:50%;
      display:block;
      box-shadow: 0 6px 18px rgba(2,6,23,0.6);
      /* smooth scaling transitions (optional) */
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .concentric .circle:hover {
      transform: scale(1.03);
      box-shadow: 0 16px 40px rgba(0,0,0,0.45);
    }

    /* sizes (largest -> smallest) */
    .concentric .outer { width:260px; height:260px; background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.06), transparent 30%), linear-gradient(150deg,var(--accent1), #7dd3fc 60%); }
    .concentric .middle{ width:170px; height:170px; background: linear-gradient(130deg,var(--accent2), #86efac 60%); }
    .concentric .inner { width:90px; height:90px; background: linear-gradient(180deg,var(--accent3), #fda4af 60%); }

    /* small label inside innermost circle */
    .concentric .inner span{
      display:flex;
      align-items:center;
      justify-content:center;
      height:100%;
      color:#031025;
      font-weight:700;
      letter-spacing:0.4px;
    }

    /* ---------------------------
       Example B: 3 circles in a container
       --------------------------- */
    .three-in-row {
      width:100%;
      max-width:420px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      padding:12px;
      flex-wrap:wrap;
    }

    .three-in-row .dot {
      width:110px;
      height:110px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      color:#05202a;
      box-shadow: 0 8px 24px rgba(2,6,23,0.55);
      transition: transform .18s ease;
      cursor:default;
    }
    .three-in-row .dot:hover { transform: translateY(-6px); }

    .dot.one   { background: linear-gradient(180deg,var(--accent1), #93c5fd 60%); }
    .dot.two   { background: linear-gradient(180deg,var(--accent2), #bbf7d0 60%); }
    .dot.three { background: linear-gradient(180deg,var(--accent3), #fecdd3 60%); }

    /* small responsive tweaks */
    @media (max-width:860px){
      .wrap { grid-template-columns:1fr; }
      .concentric { width:220px; height:220px; }
      .concentric .outer { width:220px; height:220px; }
      .concentric .middle{ width:140px; height:140px; }
      .concentric .inner { width:72px; height:72px; }
      .three-in-row .dot { width:86px; height:86px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Concentric circles -->
    <div class="card" aria-label="Concentric circles example">
      <div class="concentric" role="img" aria-hidden="false" aria-label="Three concentric circles">
        <div class="circle outer" aria-hidden="true"></div>
        <div class="circle middle" aria-hidden="true"></div>
        <div class="circle inner" aria-hidden="true"><span>3</span></div>
      </div>
      <div class="title">Concentric circles — three circles inside each other</div> -->
    <!-- </div>

    <!-- Three circles inside container -->
    <!-- <div class="card" aria-label="Three circles inside container example">
      <div class="three-in-row" role="list" aria-label="Three circles arranged">
        <div class="dot one" role="listitem" aria-label="Circle one">A</div>
        <div class="dot two" role="listitem" aria-label="Circle two">B</div>
        <div class="dot three" role="listitem" aria-label="Circle three">C</div>
      </div>
      <div class="title">Three separate circles inside a container (responsive)</div>
    </div> -->
  </div>
</body>
</html>
