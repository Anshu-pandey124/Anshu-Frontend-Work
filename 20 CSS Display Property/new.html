<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Two Circles</title>
  <style>
    .outer {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: lightblue;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .inner {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: pink;
    }
  </style>
</head>
<body>
  <div class="outer">
    <div class="inner"></div>
  </div>
</body>
</html>
